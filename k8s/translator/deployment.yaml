apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator
  namespace: book-reader
  labels:
    app.kubernetes.io/name: translator
    app.kubernetes.io/component: translation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: translator
  template:
    metadata:
      labels:
        app: translator
    spec:
      containers:
        - name: translator
          image: libretranslate/libretranslate:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          # Configuración desde ConfigMap (LT_LOAD_ONLY, LT_THREADS, PYTHONWARNINGS)
          envFrom:
            - configMapRef:
                name: translator-config
          volumeMounts:
            # Persiste los modelos de idioma descargados entre reinicios
            - name: translator-data
              mountPath: /home/libretranslate/.local
          # La descarga de modelos puede tardar varios minutos en el primer arranque
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              # LT_THREADS=4: ajustar CPU límite según el valor de threads configurado
              cpu: "2000m"
              memory: "2Gi"
      volumes:
        - name: translator-data
          persistentVolumeClaim:
            claimName: translator-pvc
