# =====================================================================
# Secret: Credenciales de PostgreSQL
# =====================================================================
# INSTRUCCIONES:
# Reemplaza los valores de 'stringData' con tus propias credenciales.
# Kubernetes codificará automáticamente los valores en base64.
#
# SEGURIDAD: No commitas este fichero con credenciales reales.
# Considera usar Sealed Secrets, Vault, o SOPS para gestión segura.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: book-reader
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: "reader"
  POSTGRES_PASSWORD: "CHANGE_ME_postgres_password"
  POSTGRES_DB: "bookreader"
