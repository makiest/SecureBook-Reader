# =====================================================================
# Secret: Variables de entorno del Backend
# =====================================================================
# INSTRUCCIONES:
# 1. Reemplaza los valores de 'stringData' con tus propias credenciales.
# 2. La DATABASE_URL debe apuntar al Service 'postgres' en el mismo namespace.
#    Formato: postgresql://USER:PASS@postgres:5432/DB
#    (USER, PASS y DB deben coincidir con los del postgres/secret.yaml)
# 3. JWT_SECRET: genera un string aleatorio largo y seguro.
#    Ejemplo: openssl rand -hex 32
#
# SEGURIDAD: No commitas este fichero con credenciales reales.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: book-reader
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
type: Opaque
stringData:
  DATABASE_URL: "postgresql://reader:CHANGE_ME_postgres_password@postgres:5432/bookreader"
  JWT_SECRET: "CHANGE_ME_generate_with_openssl_rand_hex_32"
