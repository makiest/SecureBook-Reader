# Default values for book-reader.

namespace: book-reader

registry:
  url: "REPLACE_WITH_YOUR_REGISTRY_URL"
  imagePullSecretName: harbor-credentials

postgres:
  image: postgres:15-alpine
  storage: 5Gi
  password: "REPLACE_WITH_SECURE_PASSWORD"
  dbName: "bookreader"
  user: "admin"

backend:
  image:
    repository: book-reader/backend
    tag: latest
    pullPolicy: Always
  replicas: 1
  storage: 50Gi
  jwtSecret: "REPLACE_WITH_SECURE_JWT_SECRET"
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

frontend:
  image:
    repository: book-reader/frontend
    tag: latest
    pullPolicy: Always
  replicas: 1
  hostname: books.local
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

translator:
  image:
    repository: book-reader/translator
    tag: latest
  threads: "4"
  storage: 3Gi

networkPolicy:
  enabled: true
